<div class="container-xxl flex-grow-1 container-p-y">

        



              <!-- Basic Layout -->
              <div class="row mb-6 gy-6">
                <div class="col-xl">
                  <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                      <h5 class="mb-0">Create News</h5>
                      <small class="text-body float-end">Default label</small>
                    </div>
                    <div class="card-body">
                      <form method="post">
                        <input type="hidden" name="status" id="status" value="1" />
                        <div class="mb-6">
                          <label class="form-label" for="title">Title</label>
                          <input type="text" class="form-control" id="title" name="title" placeholder="News Title" />
                        </div>
                        <div class="mb-6">
                          <label class="form-label" for="title">Publication Date</label>
                          <input type="date" class="form-control" id="publication_date" name="publication_date" placeholder="News Title" />
                        </div>
                        <div class="mb-6">
                          <label class="form-label" for="text">Text</label>
                          <textarea
                            id="body"
                            name="body"
                            class="form-control"
                            placeholder="Hi, Do you have a moment to talk Joe?"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Send</button>
                      </form>
                    </div>
                  </div>
                </div>
                
              </div>
            </div>
            <!-- / Content -->
